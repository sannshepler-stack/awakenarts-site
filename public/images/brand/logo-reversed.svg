<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 170">
  <!-- Double Arc Mark -->
  <path d="M148,70 C198,22 302,22 352,70" stroke="#C9A84C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M178.5,70 C214,29 286,29 321.5,70" stroke="rgba(201,168,76,0.60)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- AWAKENARTS Wordmark -->
  <text x="250" y="110" text-anchor="middle"
    font-family="'Cormorant Garamond','TeX Gyre Bonum',Georgia,serif" font-weight="400" font-size="36"
    letter-spacing="8" fill="#FAF7F2">AWAKENARTS</text>
  <!-- Gold Rule -->
  <line x1="110" y1="124" x2="390" y2="124" stroke="rgba(201,168,76,0.55)" stroke-width="0.8"/>
  <!-- Tagline -->
  <text x="250" y="143" text-anchor="middle"
    font-family="'Cormorant Garamond','TeX Gyre Bonum',Georgia,serif" font-style="italic" font-weight="300" font-size="14"
    letter-spacing="0.8" fill="rgba(250,247,242,0.60)">When Language Shapes a Path</text>
</svg>
