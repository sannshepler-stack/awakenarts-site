<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 170">
  <defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300&amp;display=swap');
  </style>
</defs>
  <rect width="500" height="170" fill="#FAF7F2"/>
  <!-- Double Arc Mark -->
  <path d="M148,70 C198,22 302,22 352,70" stroke="#1C2B3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M178.5,70 C214,29 286,29 321.5,70" stroke="rgba(28,43,58,0.50)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- AWAKENARTS Wordmark -->
  <text x="250" y="110" text-anchor="middle"
    font-family="'Cormorant Garamond','TeX Gyre Bonum',Georgia,serif" font-weight="400" font-size="36"
    letter-spacing="8" fill="#1C2B3A">AWAKENARTS</text>
  <!-- Gold Rule -->
  <line x1="110" y1="124" x2="390" y2="124" stroke="rgba(28,43,58,0.38)" stroke-width="0.8"/>
  <!-- Tagline -->
  <text x="250" y="143" text-anchor="middle"
    font-family="'Cormorant Garamond','TeX Gyre Bonum',Georgia,serif" font-style="italic" font-weight="300" font-size="14"
    letter-spacing="0.8" fill="rgba(28,43,58,0.58)">When Language Shapes a Path</text>
</svg>